##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule
# windowrule = float,class:^(kitty)$,title:^(kitty)$

workspace = 1 , monitor:DP-1 , default:true , persistent:true
workspace = 2 , monitor:DP-1
workspace = 3 , monitor:DP-1 
workspace = 4 , monitor:DP-1 
workspace = 5 , monitor:DP-1 
workspace = 6 , monitor:DP-1 
workspace = 7 , monitor:DP-1 
workspace = 8 , monitor:DP-1 
workspace = 9 , monitor:DP-1 
workspace = 10 , monitor:DP-1 
workspace = 11 , monitor:DP-2 , default:true , persistent:true
workspace = 12 , monitor:DP-2
workspace = 13 , monitor:DP-2
workspace = 14 , monitor:DP-2
workspace = 15 , monitor:DP-2
workspace = 16 , monitor:DP-2
workspace = 17 , monitor:DP-2
workspace = 18 , monitor:DP-2
workspace = 19 , monitor:DP-2
workspace = 20 , monitor:DP-2
workspace = name:, monitor:DP-1 , rounding:false , decorate:false , shadows:false
workspace = name:Steam, monitor:DP-1
workspace = name:Windows, monitor:DP-1

# Ignore maximize requests from apps. You'll probably like this. 
windowrule = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
windowrule = float, size 1000 700, class:org.kde.kdeconnect.app
windowrule = float, size 1000 700, class:org.kde.kdeconnect.sms
windowrule = float, size 1000 700, class:org.kde.kdeconnect-indicator
windowrule = float, size 879 879, class:org.pulseaudio.pavucontrol
windowrule = float, size 879 879, class:blueman-manager
windowrule = opacity 0.80 0.75,class:thunar
windowrule = opacity 0.80 0.75,class:Thunar
windowrule = opacity 0.80 0.75,class:org.gnome.Nautilus
windowrule = opacity 0.90 0.85,class:org.gnome.TextEditor
windowrule = opacity 0.90 0.85,class:VSCodium
windowrule = opacity 0.80 0.75,class:org.pulseaudio.pavucontrol
windowrule = workspace name:Steam silent,class:steam
windowrule = workspace name:Windows silent,class:^(Microsoft Windows)$
windowrule = workspace name:Windows silent,class:^(xfreerdp)$
windowrule = idleinhibit fullscreen, class:.*
