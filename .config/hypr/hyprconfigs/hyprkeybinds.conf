###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, Z, togglesplit, # dwindle
bind = $mainMod, Y, exec, $sysmonitor
bind = $mainMod, space, exec, ~/.config/RofiScripts/Launcher/Launcher.sh
bind = $mainMod, F, exec, firefox
bind = $mainMod SHIFT, S, exec, flameshot gui
bind = $mainMod SHIFT, T, exec, ~/.config/hypr/scripts/ocr.sh
bind = $mainMod, B, exec, pkill hyprsunset || hyprsunset -t 5300
bind = CTRL SHIFT, B, exec, killall .waybar-wrapped .nwg-dock-hyprland-wrapped; waybar & ~/.config/nwg-dock-hyprland/launch.sh
bind = CTRL SHIFT, F, fullscreen
bind = CTRL SHIFT, P, exec, hyprpicker -a -l
bind = $mainMod, T, exec, hyprlock
bind = $mainMod, Delete, exec, hyprctl kill
bind = L-ALT, space, exec, ~/.config/RofiScripts/Waybars/Waybar.sh
bind = L-ALT, F4, exec, ~/.config/RofiScripts/powermenu/powermenu.sh
bind = $mainMod L-ALT, C, exec, killall .nautilus-wrapped; nautilus
bind = CTRL SHIFT, Y, exec, ~/.config/RofiScripts/Clipboard/Clipboard.sh
bind = CTRL SUPER, space, exec, ~/.config/RofiScripts/WallpaperChanger/wall.sh
bind = CTRL SUPER, Y, exec, ~/.config/RofiScripts/WallpaperChanger/wallrandom.sh
#bind = L-ALT, TAB, hyprexpo:expo, toggle
bind = $mainMod SHIFT, Y, exec, ~/.config/RofiScripts/Themes/Randomtheme.sh
bind = $mainMod SHIFT, C, exec, hyprctl reload

# Move focus with mainMod + arrow keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# resize windows
bind = $mainMod CTRL, l, resizeactive, 100 0
bind = $mainMod CTRL, h, resizeactive, -100 0
bind = $mainMod CTRL, k, resizeactive, 0 -100
bind = $mainMod CTRL, j, resizeactive, 0 100

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod, D, workspace, +1
bind = $mainMod, A, workspace, -1
bind = $mainMod, G, workspace, name:
bind = $mainMod, U, workspace, name:Steam
bind = $mainMod, I, workspace, name:Windows

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod CTRL SHIFT, L, movetoworkspace, +1
bind = $mainMod CTRL SHIFT, H, movetoworkspace, -1
bind = $mainMod SHIFT, U, movetoworkspace, name:Steam
bind = $mainMod SHIFT, I, movetoworkspace, name:Windows

# Example special workspace (scratchpad)
bind = $mainMod, W, togglespecialworkspace, magic
bind = $mainMod SHIFT, W, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/volume_control.sh up
bindel = ,XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/volume_control.sh down
bindel = ,XF86AudioMute, exec, ~/.config/hypr/scripts/volume_control.sh mute
bindel = ,XF86AudioMicMute, exec, ~/.config/hypr/scripts/volume_control.sh mic-mute
bindel = ,XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/brightness_control.sh up
bindel = ,XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness_control.sh down



# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
