listener {
 timeout = 180
 on-timeout = ~/.config/hypr/scripts/brightness_idle.sh dim
 on-resume = ~/.config/hypr/scripts/brightness_idle.sh restore
}

listener {
 timeout = 900
 on-timeout = hyprctl dispatch dpms off; hyprlock
 on-resume = hyprctl dispatch dpms on
}
listener {
 timeout = 870
 on-timeout = notify-send "Inactivity detected" "System will be locked in 30 seconds!"
 on-resume = notify-send "Activity detected" "System lock is prevented or lifted!"
}
